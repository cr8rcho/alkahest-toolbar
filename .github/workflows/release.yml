name: Publish to npm

# Fires when a GitHub Release is published — same release channel + workflow shape as
# alkahest-cli, so one `gh release create vX.Y.Z` mirrors the SDK out to npm.
#
# Auth is npm Trusted Publishing (OIDC): GitHub mints a short-lived identity token that
# npm trusts, so there is NO stored NPM_TOKEN to rotate or leak. Requires the one-time
# setup on npmjs.com (Package settings -> Trusted Publisher) linking this repo + workflow.
on:
  release:
    types: [published]

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Guard: the release tag (vX.Y.Z) must match package.json version, so we
      # never publish a mismatched build.
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME != package.json $PKG_VERSION" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm run build

      # OIDC trusted publishing needs npm >= 11.5.1; node 20's bundled npm is older.
      - run: npm install -g npm@latest

      # No NODE_AUTH_TOKEN: npm publish authenticates via OIDC and attaches
      # provenance automatically. access=public comes from publishConfig.
      - run: npm publish
